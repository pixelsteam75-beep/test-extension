<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Focus Timer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Pixel Focus Timer</h1>

    <div class="timer-section">
      <div class="mode-display" id="modeDisplay">Idle</div>
      <div class="time-display" id="timeDisplay">00:00</div>
    </div>

    <div class="controls">
      <button id="startFocusBtn" class="btn btn-primary">Start Focus Session</button>
      <button id="startBreakBtn" class="btn btn-secondary">Start Break</button>
      <button id="resetBtn" class="btn btn-danger">Reset</button>
    </div>

    <div class="timer-settings">
      <h3>Timer Settings</h3>
      <div class="settings-row">
        <label for="focusInput">Focus Time (minutes)</label>
        <input id="focusInput" type="number" min="1" max="120" value="25">
      </div>
      <div class="settings-row">
        <label for="breakInput">Break Time (minutes)</label>
        <input id="breakInput" type="number" min="1" max="60" value="5">
      </div>
      <button id="saveSettingsBtn" class="btn btn-primary">Save Settings</button>
    </div>

    <div class="audio-toggle-container">
      <label class="audio-toggle-label">
        <span class="toggle-text">Audio</span>
        <div class="toggle-switch">
          <input type="checkbox" id="audioToggle" checked>
          <span class="toggle-slider"></span>
        </div>
      </label>
    </div>

    <div class="alarm-selector">
      <label for="alarmSound">Alarm Sound:</label>
      <select id="alarmSound" class="alarm-select">
        <option value="quiet">🔔 Quiet (Lo-fi)</option>
        <option value="loud">📢 Loud</option>
      </select>
    </div>

    <div class="dashboard-link">
      <button id="openDashboardBtn" class="btn btn-link">Open Dashboard</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
